<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
  <title>Talent Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <h1>Talent Calculator</h1>
    <div class="class-switcher">
      <button class="active">Class 1</button>
      <button>Class 2</button>
      <button>Class 3</button>
      <button>Class 4</button>
      <button>Class 5</button>
      <button>Class 6</button>
    </div>
  </div>

  <div class="talent-display">
    <!-- Talent information will be displayed here -->
  </div>
  <div class="talent-selection">
    <h2>Selected Talents:</h2>
    <ul class="selected-talents"></ul>
    <!-- Talent buttons for each class will be dynamically generated here -->
  </div>
  <script src="script.js"></script>
</body>
</html>
