<!doctype html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DrH Talent Calculator</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./theme-epic.css" />
</head>
<body>
  <div class="column-controls">
    <div id="controlSlotClass" class="control-slot control-slot-class">
      <div id="classTopControls" class="class-top-controls">
        <div id="humanToggleSlotClass"></div>
        <label id="humanToggleWrap" class="human-toggle">
          <input id="humanToggle" type="checkbox" />
          <span>Člověk</span>
        </label>
        <div id="classPicker" class="class-picker top-class-picker"></div>
        <div id="resetSlotClass"></div>
      </div>
    </div>
    <div id="controlSlotGap" class="control-slot control-slot-gap"></div>
    <div id="controlSlotSkills" class="control-slot control-slot-skills">
      <div id="skillsTopControls" class="skills-top-controls">
      </div>
    </div>
    <div id="controlSlotPlan" class="control-slot control-slot-plan">
      <div id="planTopControls" class="top-controls plan-top-controls">
        <div id="topLevelControls" class="timeline-tools top-level-tools">
          <button id="shareLinkBtn" type="button" class="lvl-btn" title="Kopírovat URL buildu">Uložit URL</button>
          <button id="timelineHelpBtn" type="button" class="timeline-help-btn" aria-label="Nápověda timeline" title="Nápověda">?</button>
          <span id="urlLoadStatus" class="url-load-status" hidden></span>
          <span class="lvl-label">Lv</span>
          <button id="manualLevelMinus" type="button" class="lvl-btn">-</button>
          <div id="manualLevelDisplay" class="level-display">1</div>
          <button id="manualLevelPlus" type="button" class="lvl-btn">+</button>
        </div>
        <div id="resetSlotPlan"></div>
      </div>
    </div>
  </div>

  <header id="mobileStickyHeader" class="mobile-sticky-header">
    <label class="mobile-class-select-wrap">
      <select id="mobileClassSelect" aria-label="Výběr povolání"></select>
    </label>
  </header>

  <main class="layout">
    <section class="panel talents-panel">
      <span id="talentCount" hidden></span>
      <div id="panelClassControls" class="mobile-panel-controls"></div>
      <div class="general-branch">
        <div id="generalNodes" class="branch-nodes general-nodes"></div>
      </div>
      <div id="generalBranchL6" class="general-branch branch-hidden">
        <div id="generalNodesL6" class="branch-nodes general-nodes"></div>
      </div>
      <div id="specPicker" class="spec-picker"></div>
      <div class="branch-grid">
        <article class="branch">
          <h3 id="branchTitle1">Větev I</h3>
          <div id="branch1" class="branch-nodes"></div>
        </article>
        <article class="branch">
          <h3 id="branchTitle2">Větev II</h3>
          <div id="branch2" class="branch-nodes"></div>
        </article>
        <article class="branch">
          <h3 id="branchTitle3">Větev III</h3>
          <div id="branch3" class="branch-nodes"></div>
        </article>
      </div>
    </section>

    <section class="panel gap-icons-panel" aria-label="Přepínač povolání">
      <div id="classGapIcons" class="class-gap-icons"></div>
    </section>

    <section class="panel skills-panel">
      <span id="skillCount" hidden></span>
      <div id="panelSkillsControls" class="mobile-panel-controls"></div>
      <div class="skills-split">
        <div id="skillListBasic" class="skills-list"></div>
        <div id="skillListClass" class="skills-list"></div>
      </div>

      <div class="points-config">
        <h3>Bodování</h3>
        <div class="cfg-grid">
          <label>Max. úroveň <input id="maxLevel" type="number" min="1" max="36" /></label>
          <label>Talent L1 <input id="talentL1" type="number" min="0" max="20" /></label>
          <label>Talent / úroveň <input id="talentPerLevel" type="number" min="0" max="20" /></label>
          <label>Dovednost L1 <input id="skillL1" type="number" min="0" max="20" /></label>
          <label>Dovednost / úroveň <input id="skillPerLevel" type="number" min="0" max="20" /></label>
        </div>
      </div>
      <div class="skills-bottom-bar">
        <div id="summary" class="summary skills-bottom-summary"></div>
        <div id="humanToggleSlotBottom"></div>
      </div>
    </section>

    <section class="panel plan-panel">
      <div id="panelPlanControls" class="mobile-panel-controls"></div>
      <div id="timeline" class="timeline"></div>
      <div id="issues" class="issues"></div>
      <div class="exchange" hidden>
        <button id="exportBtn" type="button">Export buildu</button>
        <button id="importBtn" type="button">Import buildu</button>
        <textarea id="exchangeBox" placeholder="Export / import JSON buildu"></textarea>
      </div>
    </section>
  </main>
  <div id="infoTooltip" class="info-tooltip" hidden></div>

  <button id="mobileLevelPill" type="button" class="mobile-level-pill" aria-label="Přejít na timeline">
    1
  </button>

  <button id="resetBtn" type="button" title="Reset výběru" aria-label="Reset výběru">↺</button>
  <button id="themeToggleBtn" type="button" class="floating-theme-toggle" aria-pressed="false" title="Přepnout fantasy vzhled">Fantasy OFF</button>

  <nav id="mobileSectionNav" class="mobile-section-nav" aria-label="Přepínač sekcí">
    <button type="button" class="mobile-section-btn active" data-section-index="0">Talenty</button>
    <button type="button" class="mobile-section-btn" data-section-index="1">Dovednosti</button>
    <button type="button" class="mobile-section-btn" data-section-index="2">Timeline</button>
  </nav>

  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
