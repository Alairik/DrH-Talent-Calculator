<!doctype html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DrH Talent Calculator</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>DrH Talent Calculator</h1>
      <p>Talent tree styl podle Wowhead: větve, klikací kostičky, automatický level plán.</p>
    </div>
    <div class="top-controls">
      <label>
        Povolání
        <select id="professionSelect"></select>
      </label>
      <button id="resetBtn" type="button">Reset výběru</button>
    </div>
  </header>

  <main class="layout">
    <section class="panel talents-panel">
      <div class="panel-head">
        <h2>Class Talenty</h2>
        <span id="talentCount"></span>
      </div>
      <div id="classPicker" class="class-picker"></div>
      <div class="branch-grid">
        <article class="branch">
          <h3 id="branchTitle1">Větev I</h3>
          <div id="branch1" class="branch-nodes"></div>
        </article>
        <article class="branch">
          <h3 id="branchTitle2">Větev II</h3>
          <div id="branch2" class="branch-nodes"></div>
        </article>
        <article class="branch">
          <h3 id="branchTitle3">Větev III</h3>
          <div id="branch3" class="branch-nodes"></div>
        </article>
      </div>
      <details class="general-talents">
        <summary>Obecné talenty (mimo class větve)</summary>
        <div id="generalTalents" class="general-list"></div>
      </details>
    </section>

    <section class="panel skills-panel">
      <div class="panel-head">
        <h2>Dovednosti</h2>
        <span id="skillCount"></span>
      </div>
      <div id="skillList" class="skills-list"></div>

      <div class="points-config">
        <h3>Bodování</h3>
        <div class="cfg-grid">
          <label>Max level <input id="maxLevel" type="number" min="1" max="30" /></label>
          <label>Talent L1 <input id="talentL1" type="number" min="0" max="20" /></label>
          <label>Talent / lvl <input id="talentPerLevel" type="number" min="0" max="20" /></label>
          <label>Dovednost L1 <input id="skillL1" type="number" min="0" max="20" /></label>
          <label>Dovednost / lvl <input id="skillPerLevel" type="number" min="0" max="20" /></label>
        </div>
      </div>
    </section>

    <section class="panel plan-panel">
      <div class="panel-head">
        <h2>Level Timeline</h2>
      </div>
      <div id="summary" class="summary"></div>
      <div id="issues" class="issues"></div>
      <div id="timeline" class="timeline"></div>
      <div class="exchange">
        <button id="exportBtn" type="button">Export build</button>
        <button id="importBtn" type="button">Import build</button>
        <textarea id="exchangeBox" placeholder="Export / import JSON buildu"></textarea>
      </div>
    </section>
  </main>

  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
