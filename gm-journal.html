<!doctype html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DrH GM Journal</title>
  <link rel="stylesheet" href="./gm-journal.css" />
</head>
<body>
  <main class="sheet-layout">
    <section class="left-column">
      <section class="panel controls-panel">
        <h1>Tvorba postavy (1:1)</h1>
        <p class="hint">Stejny panel a chovani jako v hlavnim kalkulatoru.</p>
        <div class="creator-embed-wrap">
          <iframe id="creatorEmbedFrame" title="DrH tvorba postavy" src="./index.html"></iframe>
        </div>
      </section>
    </section>

    <section class="panel tabs-panel">
      <header class="embed-head">
        <h2>Kalkulator (1:1)</h2>
        <a href="./index.html" target="_blank" rel="noopener">Otevrit samostatne</a>
      </header>
      <nav class="col-tabs" aria-label="Prepinani sloupcu kalkulatoru">
        <button type="button" class="col-tab-btn active" data-col-tab="talents">Schopnosti (sloupec 1)</button>
        <button type="button" class="col-tab-btn" data-col-tab="skills">Dovednosti (sloupec 3)</button>
      </nav>
      <div class="calc-embed-wrap">
        <iframe id="calcEmbedFrame" title="DrH kalkulator" src="./index.html"></iframe>
      </div>
    </section>
  </main>

  <script src="./gm-journal.js"></script>
</body>
</html>
