<!doctype html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DrH GM Journal</title>
  <link rel="stylesheet" href="./gm-journal.css" />
</head>
<body>
  <main class="sheet-layout">
    <section class="left-column">
      <section class="panel controls-panel">
        <h1>Denik PJ</h1>
        <p class="hint">Vpravo bezi primo hlavni kalkulator. Pouzita je identicka logika sloupce 1, sloupce 3 i schovavaciho panelu.</p>
      </section>

      <section class="panel diary-panel">
        <h3>Poznamky</h3>
        <textarea id="journalNotes" class="journal-notes" placeholder="Sem si pis poznamky k postave, vypraveci, kampani..."></textarea>
      </section>

      <section class="panel progression-panel">
        <h3>Checklist</h3>
        <textarea id="journalChecklist" class="journal-notes" placeholder="- cil sezeni&#10;- NPC&#10;- lokace&#10;- loot"></textarea>
      </section>
    </section>

    <section class="panel tabs-panel">
      <header class="embed-head">
        <h2>Kalkulator (1:1)</h2>
        <a href="./index.html" target="_blank" rel="noopener">Otevrit samostatne</a>
      </header>
      <div class="calc-embed-wrap">
        <iframe id="calcEmbedFrame" title="DrH kalkulator" src="./index.html"></iframe>
      </div>
    </section>
  </main>

  <script src="./gm-journal.js"></script>
</body>
</html>
